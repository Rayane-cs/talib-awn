<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting… · Talib-Awn</title>
<link rel="stylesheet" href="brand.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:var(--bg);font-family:var(--ff)}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:20px;color:var(--text3);font-size:15px}
  .logo{width:52px;height:52px;border-radius:14px;
        background:linear-gradient(135deg,var(--brand-navy),var(--brand-gold));
        display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;
        color:#fff;font-family:var(--ff);box-shadow:0 4px 20px rgba(61,158,140,.35)}
  .spin{width:32px;height:32px;border:3px solid rgba(61,158,140,.2);border-top-color:var(--brand-gold);
        border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">ط</div>
    <div class="spin"></div>
    <span>جاري التحميل…</span>
  </div>
  <script type="module">
    import { supabase, redirectByRole } from './api.js';
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; }
    else {
      const { data } = await supabase.from('users').select('role, grade').eq('auth_id', session.user.id).single();
      redirectByRole(data);
    }
  </script>
</body>
</html>
