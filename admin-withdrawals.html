<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawals · Admin · Talib-Awn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; overflow-y: auto;
    }
    .sb-hdr {
      padding: 18px 20px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; color: var(--blue); }
    .logo span { color: var(--text3); font-weight: 600; }
    .sb-nav { padding: 10px 12px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; color: var(--text2);
      transition: all var(--transition); cursor: pointer; margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--bg2); color: var(--text); }
    .nav-item.active { background: var(--blue-pale); color: var(--blue-deep); font-weight: 600; }
    [data-theme="dark"] .nav-item.active { background: rgba(33,150,243,0.15); color: var(--blue-light); }
    .nav-item .ni { width: 18px; text-align: center; font-size: 16px; }

    .main { margin-left: 240px; flex: 1; padding: 32px; max-width: 1000px; }
    .page-hdr { margin-bottom: 28px; }
    .page-hdr h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .page-hdr p  { color: var(--text3); font-size: 14px; }

    /* ─── Stats bar ─────────────────────────────────────────── */
    .stats-bar { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 18px;
      box-shadow: var(--shadow-sm); font-size: 14px;
    }
    .stat-pill .sv { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-right: 2px; }
    .stat-pill.pending-pill .sv  { color: #F57F17; }
    .stat-pill.approved-pill .sv { color: #2E7D32; }
    .stat-pill.total-pill .sv    { color: var(--blue-deep); }

    /* ─── Filter tabs ───────────────────────────────────────── */
    .tabs { display: flex; gap: 6px; margin-bottom: 20px; }
    .tab {
      padding: 8px 18px; border-radius: var(--radius-full);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text2); transition: all .15s;
    }
    .tab.active {
      background: var(--blue); border-color: var(--blue); color: #fff;
    }
    .tab:hover:not(.active) { border-color: var(--blue); color: var(--blue-deep); background: var(--blue-pale); }

    /* ─── Withdrawals table ─────────────────────────────────── */
    .section-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow-sm);
    }
    .wd-card {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 12px; overflow: hidden;
      transition: box-shadow .2s;
    }
    .wd-card:hover { box-shadow: var(--shadow); }
    .wd-card-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; gap: 12px; flex-wrap: wrap;
    }
    .wd-user { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue-light), var(--blue-deep));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .user-email { font-size: 12px; color: var(--text3); }
    .wd-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .wd-amount-big { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text); }
    .status-chip {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .status-chip.pending  { background: #FFF8E1; color: #F57F17; }
    .status-chip.approved { background: #E8F5E9; color: #2E7D32; }
    .status-chip.rejected { background: #FFEBEE; color: #C62828; }
    [data-theme="dark"] .status-chip.pending  { background: rgba(245,127,23,.18); color: #FFD54F; }
    [data-theme="dark"] .status-chip.approved { background: rgba(46,125,50,.18);  color: #81C784; }
    [data-theme="dark"] .status-chip.rejected { background: rgba(198,40,40,.18);  color: #EF9A9A; }

    .wd-card-body {
      padding: 0 16px 14px;
      border-top: 1px solid var(--border); background: var(--bg);
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 12px;
    }
    .wd-detail { font-size: 13px; }
    .wd-detail-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
    .wd-detail-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); word-break: break-all; }

    .wd-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn-approve {
      padding: 8px 18px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #2E7D32, #43A047); color: #fff;
      font-size: 13px; font-weight: 700; transition: all .15s;
    }
    .btn-approve:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46,125,50,.3); }
    .btn-approve:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-reject {
      padding: 8px 18px; border-radius: var(--radius-sm);
      background: var(--bg2); color: var(--text2);
      font-size: 13px; font-weight: 600; border: 1.5px solid var(--border);
      transition: all .15s;
    }
    .btn-reject:hover { background: #FFEBEE; color: #C62828; border-color: #FFCDD2; }
    .btn-reject:disabled { opacity: .5; cursor: not-allowed; }
    .note-input {
      flex: 1; min-width: 160px;
      padding: 8px 12px; border: 1.5px solid var(--border2);
      border-radius: var(--radius-sm); background: var(--surface);
      font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif;
      outline: none; transition: border-color .15s;
    }
    .note-input:focus { border-color: var(--blue); }
    .note-input::placeholder { color: var(--text3); }

    /* Toast */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow-lg); min-width: 260px; max-width: 360px;
      font-size: 14px; font-weight: 500;
      animation: slideIn .3s cubic-bezier(0.4,0,0.2,1);
    }
    .toast.success { border-left: 3px solid #4CAF50; }
    .toast.error   { border-left: 3px solid #F44336; }
    .toast.info    { border-left: 3px solid var(--blue); }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

    .empty-state { text-align: center; padding: 40px; color: var(--text3); }
    .empty-state .ei { font-size: 36px; margin-bottom: 10px; opacity: .5; }

    .theme-btn {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      background: var(--bg2); display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all .2s; border: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-hdr">
      <a href="index.html" class="logo">Talib<span>-Awn</span></a>
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
    <nav class="sb-nav">
      <a href="admin-panel.html"  class="nav-item"><span class="ni">🏠</span> Overview</a>
      <a href="#"                 class="nav-item active"><span class="ni">💸</span> Withdrawals</a>
      <a href="#"                 class="nav-item" id="signOutBtn"><span class="ni">↩</span> Sign Out</a>
    </nav>
  </aside>

  <main class="main">
    <div class="page-hdr">
      <h1>💸 Withdrawal Requests</h1>
      <p>Review and process student payout requests manually (CCP / Edahabia / BaridiMob)</p>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-pill pending-pill">
        <span>⏳</span><span class="sv" id="statPending">—</span><span style="color:var(--text3)">Pending</span>
      </div>
      <div class="stat-pill approved-pill">
        <span>✅</span><span class="sv" id="statApproved">—</span><span style="color:var(--text3)">Approved</span>
      </div>
      <div class="stat-pill total-pill">
        <span>💰</span><span class="sv" id="statTotal">—</span><span style="color:var(--text3)">DZD pending</span>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="tabs">
      <button class="tab active" onclick="setFilter('pending')"   id="tab-pending">⏳ Pending</button>
      <button class="tab"        onclick="setFilter('approved')"  id="tab-approved">✅ Approved</button>
      <button class="tab"        onclick="setFilter('rejected')"  id="tab-rejected">❌ Rejected</button>
      <button class="tab"        onclick="setFilter('all')"       id="tab-all">All</button>
    </div>

    <div class="section-card">
      <div id="wdCards">
        <!-- Rendered by JS -->
        <div class="empty-state"><div class="ei">⏳</div>Loading…</div>
      </div>
    </div>
  </main>
</div>

<script type="module">
import { supabase, requireProfile } from './supabase.js';
import {
  adminGetPendingWithdrawals, adminApproveWithdrawal, adminRejectWithdrawal
} from './wallet.js';

let allData   = [];
let filter    = 'pending';
let profile   = null;

(async () => {
  profile = await requireProfile();
  if (!profile) return;
  if (profile.role !== 'Admin') {
    alert('Admin access required.');
    window.location.href = 'index.html';
    return;
  }
  await loadAll();

  // Real-time updates for new withdrawal requests
  supabase
    .channel('admin-withdrawals')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'withdrawals' }, () => loadAll())
    .subscribe();
})();

async function loadAll() {
  // Load ALL withdrawals for admin (override the pending-only helper)
  const { data, error } = await supabase
    .from('withdrawals')
    .select(`*, user:users!user_id(id, firstname, lastname, email, image)`)
    .order('created_at', { ascending: true });

  if (error) { toast('Failed to load withdrawals: ' + error.message, 'error'); return; }
  allData = data ?? [];
  updateStats();
  render();
}

function updateStats() {
  const pending  = allData.filter(w => w.status === 'pending');
  const approved = allData.filter(w => w.status === 'approved');
  const totalDzd = pending.reduce((s, w) => s + Number(w.amount), 0);

  document.getElementById('statPending').textContent  = pending.length;
  document.getElementById('statApproved').textContent = approved.length;
  document.getElementById('statTotal').textContent    = fmt(totalDzd) + ' DZD';
}

function render() {
  const filtered = filter === 'all' ? allData : allData.filter(w => w.status === filter);
  const container = document.getElementById('wdCards');

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="ei">✅</div>No ${filter} requests</div>`;
    return;
  }

  const methodLabel = { ccp: 'CCP', edahabia: 'Edahabia', baridimob: 'BaridiMob' };

  container.innerHTML = filtered.map(w => `
    <div class="wd-card" id="wdc-${w.id}">
      <div class="wd-card-hdr">
        <div class="wd-user">
          <div class="avatar">
            ${w.user?.image ? `<img src="${esc(w.user.image)}" alt="">` : (w.user?.firstname?.[0] ?? '?').toUpperCase()}
          </div>
          <div>
            <div class="user-name">${esc(w.user?.firstname ?? '')} ${esc(w.user?.lastname ?? '')}</div>
            <div class="user-email">${esc(w.user?.email ?? '')}</div>
          </div>
        </div>
        <div class="wd-meta">
          <span class="wd-amount-big">${fmt(w.amount)} DZD</span>
          <span class="status-chip ${w.status}">${w.status.charAt(0).toUpperCase() + w.status.slice(1)}</span>
          <span style="font-size:12px;color:var(--text3)">${fmtDate(w.created_at)}</span>
        </div>
      </div>

      <div class="wd-card-body">
        <div class="wd-detail">
          <div class="wd-detail-label">Payout Method</div>
          <div class="wd-detail-val">${methodLabel[w.payout_method] ?? w.payout_method}</div>
        </div>
        <div class="wd-detail">
          <div class="wd-detail-label">Account / Card</div>
          <div class="wd-detail-val">${esc(w.account_number ?? '—')}</div>
        </div>
        ${w.admin_note ? `
        <div class="wd-detail" style="grid-column:1/-1">
          <div class="wd-detail-label">Admin Note</div>
          <div class="wd-detail-val" style="font-family:DM Sans,sans-serif">${esc(w.admin_note)}</div>
        </div>` : ''}
        ${w.status === 'pending' ? `
        <div style="grid-column:1/-1">
          <div class="wd-actions">
            <input type="text" class="note-input" id="note-${w.id}"
                   placeholder="Optional note (e.g. 'Sent via CCP on 18/03')">
            <button class="btn-approve" id="btn-approve-${w.id}"
                    onclick="approve(${w.id})">✓ Approve & Mark Sent</button>
            <button class="btn-reject"  id="btn-reject-${w.id}"
                    onclick="reject(${w.id})">✗ Reject</button>
          </div>
        </div>` : ''}
      </div>
    </div>`).join('');
}

window.approve = async function(wdId) {
  const note = document.getElementById(`note-${wdId}`)?.value.trim() || null;
  setBtns(wdId, true);
  const { error } = await adminApproveWithdrawal(wdId, note);
  if (error) { toast(error.message ?? 'Approval failed.', 'error'); setBtns(wdId, false); return; }
  toast('Withdrawal approved! Mark it as manually sent.', 'success');
  await loadAll();
};

window.reject = async function(wdId) {
  const note = document.getElementById(`note-${wdId}`)?.value.trim();
  if (!note && !confirm('Reject without a reason note?')) return;
  setBtns(wdId, true);
  const { error } = await adminRejectWithdrawal(wdId, note || null);
  if (error) { toast(error.message ?? 'Rejection failed.', 'error'); setBtns(wdId, false); return; }
  toast('Withdrawal rejected. Amount refunded to student.', 'info');
  await loadAll();
};

function setBtns(id, dis) {
  const a = document.getElementById(`btn-approve-${id}`);
  const r = document.getElementById(`btn-reject-${id}`);
  if (a) a.disabled = dis;
  if (r) r.disabled = dis;
}

window.setFilter = function(f) {
  filter = f;
  ['pending','approved','rejected','all'].forEach(t => {
    document.getElementById(`tab-${t}`)?.classList.toggle('active', t === f);
  });
  render();
};

function fmt(n) { return new Intl.NumberFormat('en-DZ').format(n); }
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${esc(msg)}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

// Theme
const html = document.documentElement;
const saved = localStorage.getItem('theme') ?? 'light';
html.dataset.theme = saved;
const themeBtn = document.getElementById('themeBtn');
themeBtn.textContent = saved === 'dark' ? '☀️' : '🌙';
themeBtn.addEventListener('click', () => {
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('theme', next);
  themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
});

document.getElementById('signOutBtn').addEventListener('click', async e => {
  e.preventDefault();
  await supabase.auth.signOut();
  window.location.href = 'login.html';
});
</script>
</body>
</html>
