<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In · Talib-Awn طالب عون</title>
  <link rel="stylesheet" href="auth.css">
</head>

<body>
  <div class="page-wrap">
    <div class="brand-side">
      <div class="brand-logo">
        <img src="logo-07.svg" class="brand-logo-icon" alt="Talib-Awn" style="background:transparent;box-shadow:none;">
        <div class="brand-logo-text">
          <span class="brand-logo-name">Talib-Awn</span>
          <span class="brand-logo-arabic">طالب عون</span>
        </div>
      </div>
      <div class="brand-headline">
        <div class="brand-eyebrow">Welcome back</div>
        <h1>Your next<br>opportunity <em>awaits.</em></h1>
        <p>Sign in to browse part-time jobs, offer mini services, and grow your career while studying.</p>
        <div class="brand-stats">
          <div>
            <div class="b-stat-num" id="statUsers">—</div>
            <div class="b-stat-label">Members</div>
          </div>
          <div>
            <div class="b-stat-num" id="statProjects">—</div>
            <div class="b-stat-label">Services</div>
          </div>
          <div>
            <div class="b-stat-num">Free</div>
            <div class="b-stat-label">Always</div>
          </div>
        </div>
      </div>
    </div>

    <div class="form-side">
      <div class="form-box">
        <div class="form-header">
          <h2>Sign in</h2>
          <p>Enter your credentials to continue.</p>
        </div>
        <div id="alertBox" class="alert"></div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••">
          <button type="button" class="password-toggle" id="pwdToggle">👁️</button>
        </div>
        <div style="text-align:right;margin-bottom:20px;">
          <a href="forgot-password.html"
            style="font-size:13px;color:var(--blue);font-weight:600;text-decoration:none;">Forgot password?</a>
        </div>
        <button class="btn-submit" id="loginBtn">
          <div class="spinner"></div>
          <span class="btn-label">Sign in →</span>
        </button>
        <div class="form-footer">Don't have an account? <a href="register.html">Create one free</a></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, signIn, redirectByRole, showAlert, setLoading } from './supabase.js';

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      const { data: p } = await supabase.from('users').select('role').eq('auth_id', session.user.id).single();
      redirectByRole(p?.role);
    }

    // Stats
    (async () => {
      const [{ count: u }, { count: p }] = await Promise.all([
        supabase.from('users').select('*', { count: 'exact', head: true }).neq('role', 'Admin'),
        supabase.from('projects').select('*', { count: 'exact', head: true }).eq('is_visible', true),
      ]);
      document.getElementById('statUsers').textContent = (u || 0) + '+';
      document.getElementById('statProjects').textContent = (p || 0) + '+';
    })();

    document.getElementById('pwdToggle').onclick = () => {
      const i = document.getElementById('password');
      i.type = i.type === 'password' ? 'text' : 'password';
    };

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showAlert('alertBox', 'Please fill in all fields.'); return; }

      setLoading('loginBtn', true);
      document.getElementById('alertBox').classList.remove('show');

      const { data, error } = await signIn({ email, password });
      setLoading('loginBtn', false);

      if (error) {
        const { data: prof } = await supabase.from('users').select('is_banned,ban_reason').eq('email', email).maybeSingle();
        if (prof?.is_banned) {
          showAlert('alertBox', `Account banned. Reason: ${prof.ban_reason}`);
        } else {
          showAlert('alertBox', 'Incorrect email or password.');
        }
        return;
      }
      const { data: profile } = await supabase.from('users').select('role').eq('auth_id', data.user.id).single();
      redirectByRole(profile?.role);
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>

</html>
